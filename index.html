<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вакансия</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: url('85e611c8-fa0a-4249-abdf-38a3113679b2.png') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
  }

  .container {
    text-align: center;
    padding: 50px 20px;
    background-color: rgba(0, 0, 0, 0.6); /* затемнённая подложка для читаемости */
    max-width: 600px;
    margin: 100px auto;
    border-radius: 15px;
  }

  h2 {
    color: #ffd700;
    font-size: 28px;
    margin-bottom: 20px;
  }

  p {
    font-size: 18px;
    line-height: 1.6;
  }

  .telegram-btn {
    display: inline-block;
    padding: 15px 30px;
    margin-top: 25px;
    font-size: 18px;
    color: #fff;
    background-color: #0088cc;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    transition: background-color 0.3s, transform 0.3s;
  }

  .telegram-btn:hover {
    background-color: #00aaff;
    transform: scale(1.05);
  }

  @media(max-width: 600px) {
    .container {
      margin: 50px 20px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h2>🌟 Ищем таланты в нашу команду! 🌟</h2>
  <p>
    Хотите работать в динамичной и дружелюбной команде?<br>
    У нас открыты вакансии для амбициозных и ответственных людей!<br><br>
    ✅ Интересная работа<br>
    ✅ Достойная оплата<br>
    ✅ Возможность роста и развития
  </p>
  <a href="https://t.me/Caelum_Vox" target="_blank" class="telegram-btn">Написать в Telegram</a>
  <p style="margin-top:15px; color:#ddd; font-size:14px;">
    По всем вопросам пишите в лс.
  </p>
</div>

</body>
</html>
