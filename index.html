<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Молочная ферма</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f9f9f9;
}

header {
    background: #4CAF50;
    color: white;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

.hero {
    background: #e8f5e9;
    text-align: center;
    padding: 40px;
}

.products {
    padding: 20px;
    text-align: center;
}

.product-list {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.product {
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 200px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.product img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: #4CAF50;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #45a049;
}

footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 10px;
}

.cart {
    position: fixed;
    top: 10px;
    right: 10px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
</style>

</head>
<body>

<header>
    <h1>🥛 Молочная ферма</h1>
    <nav>
        <a href="#">Главная</a>
        <a href="#">Каталог</a>
        <a href="#">Контакты</a>
    </nav>
</header>

<div class="cart">
    🛒 Товаров: <span id="cart-count">0</span>
</div>

<section class="hero">
    <h2>Свежие молочные продукты каждый день</h2>
    <p>Молоко, сыр, йогурты — прямо с фермы</p>
</section>

<section class="products">
    <h2>Наши товары</h2>
    <div class="product-list">

        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Молоко">
            <h3>Молоко</h3>
            <p>Свежие фермерское молоко</p>
            <span>€1.50</span><br>
            <button onclick="addToCart()">Купить</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Сыр">
            <h3>Сыр</h3>
            <p>Натуральный твердый сыр</p>
            <span>€4.00</span><br>
            <button onclick="addToCart()">Купить</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Йогурт">
            <h3>Йогурт</h3>
            <p>Домашний йогурт</p>
            <span>€2.00</span><br>
            <button onclick="addToCart()">Купить</button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Молочная ферма</p>
</footer>

<script>
let count = 0;

function addToCart() {
    count++;
    document.getElementById("cart-count").innerText = count;
}
</script>

</body>
</html>
</script>

</body>
</html>
